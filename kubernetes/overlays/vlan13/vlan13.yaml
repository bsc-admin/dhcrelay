apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dhcrelay-vlan13
  namespace: network
  labels:
    app: dhcrelay
    vlan: "13"
spec:
  selector:
    matchLabels:
      app: dhcrelay
      vlan: "13"
  template:
    metadata:
      labels:
        app: dhcrelay
        vlan: "13"
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: k3s-01
      tolerations:
        - operator: Exists
      containers:
        - name: dhcrelay
          image: ghcr.io/bsc-admin/dhcrelay:latest
          args: ["-i", "ens18.13", "10.54.11.211"]
          securityContext:
            capabilities:
              add:
                - NET_RAW
                - NET_ADMIN
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 20m
              memory: 16Mi
